# =============================================================================
# ConfigMap: Shared environment variables for Superset + Redis
# NOTE: Keycloak and PostgreSQL are assumed to already exist in the cluster.
#       Update KEYCLOAK_INTERNAL_URL / KEYCLOAK_EXTERNAL_URL to match your
#       existing Keycloak service name/namespace if different.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: env
  labels:
    app: superset
data:
  # --- Superset ---
  SUPERSET_SECRET_KEY: dfXeb4yvtbsF7P1JDlDItoAifnfUIujS   # Change in production
  SUPERSET_ADMIN_USERNAME: supersetadmin
  SUPERSET_ADMIN_FIRSTNAME: Admin
  SUPERSET_ADMIN_LASTNAME: User
  SUPERSET_ADMIN_EMAIL: supersetadmin@superset.com
  SUPERSET_ADMIN_PASSWORD: admin                            # Change in production
  SUPERSET_LOAD_EXAMPLES: "yes"
  SUPERSET_PORT: "8088"
  SUPERSET_INTERNAL_URL: http://superset:8088
  SUPERSET_EXTERNAL_URL: http://localhost:8080

  # --- Redis ---
  SUPERSET_REDIS_HOST: redis
  SUPERSET_REDIS_PORT: "6379"

  # --- Keycloak (point to your existing Keycloak service) ---
  KEYCLOAK_REALM: superset_realm
  KEYCLOAK_CLIENT_SECRET: Z2Gen97MXT3Zdpkc4ZIgipWc4blBaTwu # Change in production
  KEYCLOAK_INTERNAL_URL: http://keycloak:8090               # Internal cluster service name
  KEYCLOAK_EXTERNAL_URL: http://localhost:8090           # Browser-accessible URL
  KEYCLOAK_HOSTNAME: localhost
  KEYCLOAK_HOSTNAME_PORT: "8090"
  KEYCLOAK_REDIRECT_URIS: http://localhost:8088/*,http://superset:8088/*
  KEYCLOAK_WEB_ORIGINS: http://localhost:8088,http://superset:8088

    # --- PostgreSQL (used by Keycloak) ---
  POSTGRES_DB: keycloak
  POSTGRES_USER: keycloak
  POSTGRES_PASSWORD: keycloak_db_password
  POSTGRES_PORT: "5432"

  # --- Keycloak Admin ---
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin