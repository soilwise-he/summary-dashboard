# =============================================================================
# NetworkPolicy — allow traffic between pods in the app-network group
# Uses the current stable API (networking.k8s.io/v1), not the deprecated
# extensions/v1beta1 that kompose generated.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-network
spec:
  podSelector:
    matchLabels:
      io.kompose.network/app-network: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              io.kompose.network/app-network: "true"