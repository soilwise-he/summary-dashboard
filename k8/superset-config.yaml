# =============================================================================
# ConfigMap: superset_config.py — mounted into the Superset pod at runtime
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-config-file
  labels:
    app: superset
data:
  superset_config.py: |
    import os
    import logging
    import redis
    from flask import request, session
    from flask_appbuilder.security.manager import AUTH_OAUTH
    from superset.security import SupersetSecurityManager

    logging.basicConfig(level=logging.DEBUG)

    # ---------------------------------------------------------------------------
    # Keycloak URLs + credentials (injected via env ConfigMap)
    # ---------------------------------------------------------------------------
    KEYCLOAK_INTERNAL_URL  = os.getenv('KEYCLOAK_INTERNAL_URL')   # pod-to-pod
    KEYCLOAK_EXTERNAL_URL  = os.getenv('KEYCLOAK_EXTERNAL_URL')   # browser-facing
    KEYCLOAK_REALM         = os.getenv('KEYCLOAK_REALM', 'superset_realm')
    KEYCLOAK_CLIENT_ID     = os.getenv('KEYCLOAK_CLIENT_ID', 'superset')
    KEYCLOAK_CLIENT_SECRET = os.getenv('KEYCLOAK_CLIENT_SECRET')

    # ---------------------------------------------------------------------------
    # Core
    # ---------------------------------------------------------------------------
    ROW_LIMIT               = 5000
    SUPERSET_WEBSERVER_PORT = 8088
    ENABLE_PROXY_FIX        = False
    SEND_FILE_MAX_AGE_DEFAULT = 0

    # Explicitly set the OAuth callback URL so Superset always sends the correct
    # redirect_uri to Keycloak regardless of what host the request came in on.
    # SERVER_NAME cannot be used here as it breaks internal k8s health probes.
    OVERWRITE_REDIRECT_URI = 'http://localhost:8088/oauth-authorized/keycloak'

    # ---------------------------------------------------------------------------
    # Database
    # ---------------------------------------------------------------------------
    SQLALCHEMY_DATABASE_URI = 'sqlite:////app/superset_home/superset.db'

    # ---------------------------------------------------------------------------
    # Auth — OAuth via Keycloak
    # ---------------------------------------------------------------------------
    AUTH_TYPE                    = AUTH_OAUTH
    AUTH_USER_REGISTRATION       = True
    AUTH_USER_REGISTRATION_ROLE  = 'Gamma'   # safe default; admin role granted via Keycloak roles
    AUTH_ROLE_ADMIN              = 'Admin'
    AUTH_ROLE_PUBLIC             = 'Public'

    OAUTH_PROVIDERS = [
        {
            'name': 'keycloak',
            'icon': 'fa-key',
            'token_key': 'access_token',
            'remote_app': {
                'client_id':     KEYCLOAK_CLIENT_ID,
                'client_secret': KEYCLOAK_CLIENT_SECRET,

                # All server-side calls use the internal cluster URL (pod-to-pod).
                # We do NOT use server_metadata_url because auto-discovery would
                # overwrite authorize_url with the internal URL, which the browser
                # cannot reach — causing the redirect loop.
                'access_token_url': (
                    f'{KEYCLOAK_INTERNAL_URL}/realms/{KEYCLOAK_REALM}'
                    '/protocol/openid-connect/token'
                ),
                'api_base_url': (
                    f'{KEYCLOAK_INTERNAL_URL}/realms/{KEYCLOAK_REALM}/protocol/'
                ),
                'jwks_uri': (
                    f'{KEYCLOAK_INTERNAL_URL}/realms/{KEYCLOAK_REALM}'
                    '/protocol/openid-connect/certs'
                ),
                'userinfo_endpoint': (
                    f'{KEYCLOAK_INTERNAL_URL}/realms/{KEYCLOAK_REALM}'
                    '/protocol/openid-connect/userinfo'
                ),

                # Browser redirect — MUST use the external URL the browser can reach
                'authorize_url': (
                    f'{KEYCLOAK_EXTERNAL_URL}/realms/{KEYCLOAK_REALM}'
                    '/protocol/openid-connect/auth'
                ),

                'client_kwargs': {
                    'scope': 'openid email profile',
                    'token_endpoint_auth_method': 'client_secret_post',
                    # Must match the `iss` claim in the JWT — confirmed as internal URL
                    'issuer': f'{KEYCLOAK_EXTERNAL_URL}/realms/{KEYCLOAK_REALM}',
                },
            },
        }
    ]

    # ---------------------------------------------------------------------------
    # Security manager — maps Keycloak realm roles → Superset roles
    # ---------------------------------------------------------------------------
    class CustomSecurityManager(SupersetSecurityManager):

        def oauth_user_info(self, provider, response=None):
            if provider != 'keycloak':
                return super().oauth_user_info(provider, response)

            userinfo = self.appbuilder.sm.oauth_remotes[provider].get(
                'openid-connect/userinfo'
            ).json()

            keycloak_roles = userinfo.get('roles', [])
            is_admin       = bool({'admin', 'realm-admin'} & set(keycloak_roles))

            return {
                'username':   userinfo.get('preferred_username', ''),
                'email':      userinfo.get('email', ''),
                'first_name': userinfo.get('given_name', ''),
                'last_name':  userinfo.get('family_name', ''),
                'role_keys':  ['Admin'] if is_admin else ['Gamma'],
            }

        def get_oauth_redirect_logout_url(self, provider):
            if provider == 'keycloak':
                return (
                    f'{KEYCLOAK_EXTERNAL_URL}/realms/{KEYCLOAK_REALM}'
                    f'/protocol/openid-connect/logout'
                    f'?post_logout_redirect_uri={request.url_root}'
                    f'&client_id={KEYCLOAK_CLIENT_ID}'
                )
            return None

        def get_oauth_user_info(self, provider, resp):
            user_info = super().get_oauth_user_info(provider, resp)
            session['oauth_provider'] = provider
            return user_info

    CUSTOM_SECURITY_MANAGER = CustomSecurityManager

    # ---------------------------------------------------------------------------
    # Session (server-side, stored in Redis)
    # ---------------------------------------------------------------------------
    _redis_host = os.getenv('SUPERSET_REDIS_HOST', 'redis')
    _redis_port = int(os.getenv('SUPERSET_REDIS_PORT', 6379))

    SESSION_TYPE               = 'filesystem'
    SESSION_FILE_DIR           = '/app/superset_home/flask_session'
    SESSION_COOKIE_HTTPONLY    = True
    SESSION_COOKIE_SECURE      = False
    SESSION_COOKIE_SAMESITE    = 'Lax'
    PERMANENT_SESSION_LIFETIME = 1800
    SESSION_REFRESH_EACH_REQUEST = True
    REMEMBER_COOKIE_DURATION   = 0

    # ---------------------------------------------------------------------------
    # Cache (Redis)
    # ---------------------------------------------------------------------------
    CACHE_CONFIG = {
        'CACHE_TYPE':            'RedisCache',
        'CACHE_DEFAULT_TIMEOUT': 300,
        'CACHE_KEY_PREFIX':      'superset_cache_',
        'CACHE_REDIS_HOST':      _redis_host,
        'CACHE_REDIS_PORT':      _redis_port,
        'CACHE_REDIS_DB':        1,
    }

    RESULTS_BACKEND = CACHE_CONFIG

    # ---------------------------------------------------------------------------
    # Misc
    # ---------------------------------------------------------------------------
    SECRET_KEY       = os.getenv('SUPERSET_SECRET_KEY')
    WTF_CSRF_ENABLED = False   # CSRF handled by Keycloak OIDC flow