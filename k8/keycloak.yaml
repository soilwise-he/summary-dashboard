
# =============================================================================
# Keycloak — Realm ConfigMap + Deployment + NodePort Service
# FOR LOCAL TESTING ONLY — skip this in production (already runs in cluster)
# Accessible at http://localhost:30090 via minikube
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  labels:
    app: keycloak
data:
  superset_realm.json: |
    {
      "realm": "superset_realm",
      "enabled": true,
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "email": "admin@example.com",
          "firstName": "Admin",
          "lastName": "User",
          "credentials": [
            {
              "type": "password",
              "value": "admin",
              "temporary": false
            }
          ],
          "realmRoles": ["default-roles-superset_realm", "offline_access", "uma_authorization", "admin"],
          "clientRoles": {
            "realm-management": ["manage-users", "manage-clients", "manage-realm"]
          }
        }
      ],
      "clients": [
        {
          "clientId": "superset",
          "name": "Superset",
          "enabled": true,
          "secret": "Z2Gen97MXT3Zdpkc4ZIgipWc4blBaTwu",
          "publicClient": false,
          "redirectUris": [
            "http://localhost:8088/*",
            "http://localhost:30088/*"
          ],
          "webOrigins": [
            "http://localhost:8088",
            "http://localhost:30088"
          ],
          "protocol": "openid-connect",
          "attributes": {
            "access.token.lifespan": "600"
          },
          "protocolMappers": [
            {
              "name": "roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {
                "multivalued": "true",
                "userinfo.token.claim": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "roles",
                "jsonType.label": "String"
              }
            }
          ]
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administrator role"
          },
          {
            "name": "user",
            "description": "User role"
          }
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
        io.kompose.network/app-network: "true"
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0
          args:
            - start-dev
            - --import-realm
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: POSTGRES_PASSWORD
            - name: KC_HOSTNAME
              value: "localhost"
            - name: KC_HOSTNAME_PORT
              value: "8090"
            - name: KC_HOSTNAME_ADMIN
              value: "localhost"
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: KEYCLOAK_ADMIN_PASSWORD
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - "sh"
                - "-c"
                - "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e \"GET /health/ready HTTP/1.1\r\nhost: 127.0.0.1\r\nConnection: close\r\n\r\n\" >&3; grep \"HTTP/1.1 200 OK\" <&3"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm-config
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 8090
      targetPort: 8080
  selector:
    app: keycloak